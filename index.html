<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DEMORES黛茂诗 · 植萃礼遇转盘</title>
    <style>
        :root {
            --bg: #f6faf6;
            --card-bg: #ffffff;
            --green-light: #d9eddf;
            --green-lighter: #cfe5d5;
            --green-mid: #81c784;
            --green-deep: #2e7d32;
            --green-dark: #1b5e20;
            --green-highlight: #388e3c;
            --text: #2c3e2d;
            --text-light: #5a7d5c;
            --gold: #c8a84e;
            --gold-light: #f0e4c3;
            --shadow: 0 8px 32px rgba(46, 125, 50, 0.10);
            --shadow-lg: 0 16px 48px rgba(46, 125, 50, 0.14);
            --radius: 20px;
            --transition: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #f2f8f3 0%, #e8f4ea 30%, #f5faf6 60%, #edf6ef 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            top: -180px; right: -120px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(129, 199, 132, 0.10) 0%, transparent 70%);
        }
        body::after {
            bottom: -150px; left: -100px;
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(200, 168, 78, 0.07) 0%, transparent 70%);
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 540px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }

        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .header .brand-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: var(--green-deep);
            background: var(--green-light);
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 500;
        }
        .header .brand-tag::before, .header .brand-tag::after {
            content: '✦';
            font-size: 0.7rem;
            color: var(--gold);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--green-dark);
            letter-spacing: 0.05em;
            line-height: 1.3;
        }
        .header .subtitle {
            font-size: 0.95rem;
            color: var(--text-light);
            letter-spacing: 0.04em;
            font-weight: 400;
        }
        .used-message {
            display: none;
            font-size: 0.9rem;
            color: #b8860b;
            background: #fef9e7;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
        }
        .used-message.show { display: inline-block; }

        .wheel-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px 16px 24px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            border: 1px solid rgba(129, 199, 132, 0.18);
            position: relative;
            transition: box-shadow 0.5s ease;
        }
        .wheel-card.has-result {
            box-shadow: 0 20px 56px rgba(46, 125, 50, 0.18), 0 0 0 1px rgba(129, 199, 132, 0.25);
        }

        .wheel-canvas-wrap {
            position: relative;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .wheel-canvas-wrap:hover { transform: scale(1.015); }
        .wheel-canvas-wrap:active { transform: scale(0.985); }
        .wheel-canvas-wrap.disabled {
            cursor: not-allowed;
            pointer-events: none;
            transform: none;
        }
        canvas#wheelCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .pointer-glow {
            position: absolute;
            top: -6px; left: 50%; transform: translateX(-50%);
            width: 36px; height: 36px;
            background: radial-gradient(circle, rgba(200, 168, 78, 0.5) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            animation: glowPulse 2.2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,100%{ opacity:0.5; transform:translateX(-50%) scale(1); }
            50%{ opacity:1; transform:translateX(-50%) scale(1.5); }
        }

        .result-area {
            width: 100%;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
        }
        .result-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: fadeInUp 0.5s ease forwards;
        }
        @keyframes fadeInUp {
            from{ opacity:0; transform:translateY(12px); }
            to{ opacity:1; transform:translateY(0); }
        }
        .result-label { font-size:1rem; color:var(--text-light); font-weight:600; }
        .result-prize-name {
            font-size:1.4rem; font-weight:700; color:var(--green-deep);
            background:var(--green-light); padding:8px 22px; border-radius:24px;
        }
        .result-prize-name.special { color:#b8860b; background:var(--gold-light); animation:shimmer 1.6s infinite; }
        @keyframes shimmer { 0%,100%{ box-shadow:0 0 0 0 rgba(200,168,78,0.35); } 50%{ box-shadow:0 0 0 14px rgba(200,168,78,0); } }
        .result-detail { font-size:0.95rem; color:var(--text-light); max-width:340px; line-height:1.5; }
        .btn-open-modal {
            background: none; border:1px solid #81c784; color:#2e7d32;
            font-size:0.85rem; font-weight:600; padding:6px 18px; border-radius:18px;
            cursor:pointer; transition:0.2s; background:rgba(129,199,132,0.08);
        }
        .btn-open-modal:hover { background:rgba(129,199,132,0.2); border-color:#2e7d32; }

        .btn-draw {
            display: inline-flex;
            align-items:center;
            gap:8px;
            padding:14px 36px;
            font-size:1.05rem;
            font-weight:600;
            color:#fff;
            background:linear-gradient(135deg,#43a047,#2e7d32);
            border:none;
            border-radius:30px;
            cursor:pointer;
            box-shadow:0 6px 20px rgba(46,125,50,0.3);
            transition:0.35s;
            position:relative;
            overflow:hidden;
        }
        .btn-draw:hover { background:linear-gradient(135deg,#4caf50,#388e3c); transform:translateY(-2px); }
        .btn-draw:active { transform:translateY(1px); }
        .btn-draw:disabled { background:#bdbdbd; cursor:not-allowed; transform:none; }
        .btn-draw .btn-icon { animation:btnIconBounce 2s infinite; }
        @keyframes btnIconBounce { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }

        .prize-hint { font-size:0.72rem; color:#999; text-align:center; opacity:0.7; }

        .bottom-rules-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #c8e0ca;
            color: #2e7d32;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 0.05em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
            margin-top: 4px;
        }
        .bottom-rules-btn:hover {
            background: #fff;
            border-color: #66bb6a;
            box-shadow: 0 4px 12px rgba(46,125,50,0.15);
        }

        /* 模态弹窗 */
        .modal-overlay {
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.55);
            z-index:1000;
            display:flex;
            align-items:center;
            justify-content:center;
            opacity:0;
            visibility:hidden;
            transition:0.3s;
            padding:20px;
        }
        .modal-overlay.active { opacity:1; visibility:visible; }
        .modal-dialog {
            background:#fff;
            border-radius:24px;
            max-width:420px;
            width:100%;
            padding:28px 24px 24px;
            box-shadow:0 24px 64px rgba(0,0,0,0.3);
            text-align:center;
            position:relative;
            animation:modalPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
            max-height:85vh;
            overflow-y:auto;
            border:1px solid rgba(129,199,132,0.25);
        }
        @keyframes modalPop {
            from{ transform:scale(0.85); opacity:0; }
            to{ transform:scale(1); opacity:1; }
        }
        .modal-close {
            position:absolute;
            top:12px; right:16px;
            background:#f1f6f1;
            border:none;
            font-size:1.5rem;
            cursor:pointer;
            color:#8aa98d;
            width:32px; height:32px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .modal-close:hover { color:#2e7d32; background:#d9eddf; }

        .modal-prize-title { font-size:1.5rem; font-weight:700; color:#1b5e20; margin-bottom:8px; }
        .modal-prize-title.special { color:#b8860b; }
        .modal-prize-detail { font-size:0.95rem; color:#5a7d5c; margin-bottom:12px; white-space:pre-line; line-height:1.6; }
        .choice-section {
            background:#f6fbf7;
            border-radius:16px;
            padding:12px;
            margin:12px 0;
            border:1px solid #d9eddf;
        }
        .choice-section p { font-weight:600; color:#1b5e20; font-size:0.9rem; margin-bottom:10px; }
        .choice-buttons { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
        .choice-btn {
            flex:1;
            min-width:120px;
            padding:10px 8px;
            border:2px solid #c8e0ca;
            border-radius:14px;
            background:#fff;
            font-size:0.85rem;
            font-weight:600;
            color:#2e7d32;
            cursor:pointer;
            transition:0.2s;
        }
        .choice-btn:hover { border-color:#66bb6a; background:#e8f5e9; }
        .choice-btn.selected { border-color:#2e7d32; background:#2e7d32; color:#fff; box-shadow:0 4px 12px rgba(46,125,50,0.3); }

        .qr-container {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:10px;
            margin:18px 0;
        }
        .qr-img {
            width:160px;
            height:160px;
            border-radius:16px;
            border:2px solid #d9eddf;
            padding:6px;
            background:#fff;
            object-fit:contain;
        }
        .qr-hint { font-size:0.9rem; color:#2e7d32; font-weight:500; }

        .address-section {
            text-align:left;
            margin-top:12px;
            border-top:1px solid #e2f0e4;
            padding-top:16px;
            display:none;
        }
        .address-section h4 { font-size:1rem; color:#1b5e20; margin-bottom:12px; text-align:center; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-size:0.85rem; color:#3d5a3f; margin-bottom:4px; }
        .form-group input, .form-group textarea {
            width:100%;
            padding:10px 12px;
            border:1px solid #d0e0d2;
            border-radius:12px;
            font-size:0.9rem;
            background:#fafdfa;
            color:#2c3e2d;
        }
        .btn-submit {
            width:100%;
            padding:12px;
            background:linear-gradient(135deg,#43a047,#2e7d32);
            color:#fff;
            border:none;
            border-radius:30px;
            font-weight:600;
            font-size:0.95rem;
            cursor:pointer;
            margin-top:6px;
        }
        .btn-submit:disabled { background:#bdbdbd; }
        .btn-miniapp {
            display:inline-block;
            width:100%;
            text-align:center;
            margin-top:8px;
            background:#2e7d32;
            color:#fff;
            padding:14px;
            border-radius:30px;
            font-weight:600;
            cursor:pointer;
            border:none;
            font-size:1rem;
            text-decoration:none;
        }
        .weapp-btn {
            width:100%;
            margin-top:8px;
            padding:14px;
            border-radius:30px;
            font-weight:600;
            font-size:1rem;
            cursor:pointer;
            background:#07c160;
            color:#fff;
            border:none;
        }
        .submit-success {
            display:none;
            text-align:center;
            color:#2e7d32;
            font-weight:600;
            margin-top:10px;
            font-size:0.9rem;
        }

        /* 规则弹窗 */
        .rules-modal-content {
            text-align:left;
            font-size:0.8rem;
            color:#3d5a3f;
            line-height:1.7;
            max-height:70vh;
            overflow-y:auto;
            padding-right:6px;
        }
        .rules-modal-content h3 { font-size:1rem; color:#1b5e20; margin:16px 0 8px; font-weight:700; }
        .rules-modal-content p { margin-bottom:8px; }
        .rules-modal-content ul { padding-left:20px; margin-bottom:10px; }
        .rules-modal-content li { margin-bottom:4px; }

        @media (max-width:480px) {
            .main-container { gap:14px; }
            .wheel-card { padding:12px 8px 16px; border-radius:18px; }
            .wheel-canvas-wrap { max-width:340px; }
            .header h1 { font-size:1.5rem; }
            .btn-draw { padding:12px 28px; font-size:0.95rem; }
            .result-prize-name { font-size:1.2rem; }
            .result-detail { font-size:0.85rem; max-width:280px; }
            .modal-dialog { padding:20px 16px; }
            .qr-img { width:130px; height:130px; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="header">
        <span class="brand-tag">DEMORES 黛茂诗 · 私享礼遇</span>
        <h1>植萃礼遇转盘</h1>
        <p class="subtitle">转动惊喜，解锁专属愈养好礼</p>
        <span class="used-message" id="usedMessage">🎉 您已参与过抽奖，每位用户仅限一次</span>
    </div>

    <div class="wheel-card" id="wheelCard">
        <div class="wheel-canvas-wrap" id="canvasWrap">
            <div class="pointer-glow"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <div class="result-area" id="resultArea">
            <span style="color:#b0bdb1;font-size:0.85rem;">点击转盘或下方按钮开始抽奖</span>
        </div>
        <button class="btn-draw" id="btnDraw">🎯 开始抽奖</button>
        <p class="prize-hint">特等0.4% / 一等1% / 二等2% / 三等3.5% / 四等5% / 普惠88.1%</p>
    </div>

    <button class="bottom-rules-btn" id="rulesBtn">📜 查看活动规则</button>
</div>

<!-- 领奖弹窗 -->
<div class="modal-overlay" id="prizeModal">
    <div class="modal-dialog">
        <button class="modal-close" id="modalClose">&times;</button>
        <div id="modalPrizeTitle" class="modal-prize-title"></div>
        <div id="modalPrizeDetail" class="modal-prize-detail"></div>
        <div class="choice-section" id="choiceSection" style="display:none;">
            <p>请选择您想要的奖品：</p>
            <div class="choice-buttons" id="choiceButtons"></div>
        </div>
        <div class="qr-container">
            <img src="日化私域二维码.jpg" alt="微信二维码" class="qr-img" id="qrImage"
                 onerror="this.style.display='none';document.getElementById('qrPlaceholder').style.display='flex';">
            <div id="qrPlaceholder" style="display:none;width:160px;height:160px;background:#f5faf6;border:2px dashed #c8e0ca;border-radius:16px;align-items:center;justify-content:center;color:#8aa98d;font-size:0.85rem;">二维码图片未找到</div>
            <p class="qr-hint">请<strong>添加微信</strong>领取奖品，联系客服</p>
        </div>
        <div id="miniappSection" style="display:none;">
            <wx-open-launch-weapp id="launchBtn" username="你的小程序原始id" path="pages/index/index" style="width:100%;">
                <script type="text/wxtag-template">
                    <button class="weapp-btn" style="width:100%; padding:14px; background:#07c160; color:#fff; border:none; border-radius:30px; font-size:1rem; font-weight:600;">
                        打开小程序领取优惠券
                    </button>
                </script>
            </wx-open-launch-weapp>
            <button class="btn-miniapp" id="btnOpenMiniappQr">📱 扫小程序码领取优惠券</button>
        </div>
        <div class="address-section" id="addressSection">
            <h4>📦 填写收货信息</h4>
            <div class="form-group">
                <label for="receiverName">收件人姓名</label>
                <input type="text" id="receiverName" placeholder="请输入姓名" required>
            </div>
            <div class="form-group">
                <label for="receiverPhone">手机号码</label>
                <input type="tel" id="receiverPhone" placeholder="请输入手机号" required>
            </div>
            <div class="form-group">
                <label for="receiverAddress">详细地址</label>
                <textarea id="receiverAddress" placeholder="省/市/区+详细地址" required></textarea>
            </div>
            <button class="btn-submit" id="btnSubmitAddress">提交地址</button>
            <div class="submit-success" id="submitSuccess">✅ 地址已提交，请添加微信领奖！</div>
        </div>
    </div>
</div>

<!-- 小程序码弹窗 -->
<div class="modal-overlay" id="miniappQrModal">
    <div class="modal-dialog">
        <button class="modal-close" id="miniappQrClose">&times;</button>
        <h3 style="color:#1b5e20; margin-bottom:16px;">进入小程序商城</h3>
        <img src="miniprogram-qr.jpg" alt="小程序码" class="qr-img" id="miniappQrImg"
             onerror="this.style.display='none'; document.getElementById('miniappQrPlaceholder').style.display='flex';"
             style="width:200px; height:200px; margin:0 auto 16px;">
        <div id="miniappQrPlaceholder" style="display:none; width:200px; height:200px; margin:0 auto 16px; background:#f5faf6; border:2px dashed #c8e0ca; border-radius:16px; align-items:center; justify-content:center; color:#8aa98d; font-size:0.85rem;">
            小程序码图片未找到<br>请将miniprogram-qr.jpg放入目录
        </div>
        <p style="font-size:0.9rem; color:#5a7d5c; line-height:1.5;">
            请使用微信<strong>扫描或长按识别</strong>上方小程序码，<br>进入黛茂诗官方小程序商城领取优惠券。
        </p>
    </div>
</div>

<!-- 活动规则弹窗 -->
<div class="modal-overlay" id="rulesModal">
    <div class="modal-dialog" style="max-width:500px; text-align:left;">
        <button class="modal-close" id="rulesClose">&times;</button>
        <h3 style="text-align:center;color:#1b5e20;">📜 活动规则</h3>
        <div class="rules-modal-content" id="rulesContent"></div>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvasWrap');
    const btnDraw = document.getElementById('btnDraw');
    const resultArea = document.getElementById('resultArea');
    const wheelCard = document.getElementById('wheelCard');
    const prizeModal = document.getElementById('prizeModal');
    const modalClose = document.getElementById('modalClose');
    const modalPrizeTitle = document.getElementById('modalPrizeTitle');
    const modalPrizeDetail = document.getElementById('modalPrizeDetail');
    const choiceSection = document.getElementById('choiceSection');
    const choiceButtons = document.getElementById('choiceButtons');
    const addressSection = document.getElementById('addressSection');
    const miniappSection = document.getElementById('miniappSection');
    const btnOpenMiniappQr = document.getElementById('btnOpenMiniappQr');
    const miniappQrModal = document.getElementById('miniappQrModal');
    const miniappQrClose = document.getElementById('miniappQrClose');
    const receiverName = document.getElementById('receiverName');
    const receiverPhone = document.getElementById('receiverPhone');
    const receiverAddress = document.getElementById('receiverAddress');
    const btnSubmitAddress = document.getElementById('btnSubmitAddress');
    const submitSuccess = document.getElementById('submitSuccess');
    const rulesModal = document.getElementById('rulesModal');
    const rulesClose = document.getElementById('rulesClose');
    const usedMessage = document.getElementById('usedMessage');

    const FEISHU_WEBHOOK = 'https://open.feishu.cn/open-apis/bot/v2/hook/ddaa38ab-3fb0-4d0f-87b1-b4ffa9b0fd6f';

    const CANVAS_SIZE = 500;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = CANVAS_SIZE * dpr;
    canvas.height = CANVAS_SIZE * dpr;
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    ctx.scale(dpr, dpr);
    const cx = CANVAS_SIZE / 2, cy = CANVAS_SIZE / 2;
    const outerRadius = 200, innerRadius = 100, centerDiscRadius = 72;

    const STORAGE_USED = 'demoress_lottery_used_final_v2';
    const STORAGE_RESULT = 'demoress_lottery_result_final_v2';
    const STORAGE_ADDRESS = 'demoress_address_submitted_final_v2';

    // 统一的字体样式（完整字符串，避免被省略）
    const fontFamily = '"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif';

    const prizes = [
        { index:0, name:'特等奖', label:'特等奖',
          detail:'二选一：① 黛茂诗全系列正装礼盒（洗发水+去角质啫喱+发膜+精华液） | ② 黛茂诗酒店（豫园店）豪华房免房券*1',
          probability:0.004, isSpecial:true,
          choices:['全系列正装礼盒', '豪华房免房券*1'] },
        { index:1, name:'一等奖', label:'一等奖',
          detail:'二选一：① 黛茂诗明星单品正装1瓶（乌斯玛草控油洗发水） | ② 黛茂诗酒店（豫园店）350元房晚兑换券*1',
          probability:0.01, isSpecial:false,
          choices:['明星单品洗发水', '350元房晚兑换券*1'] },
        { index:2, name:'二等奖', label:'二等奖', detail:'黛茂诗居享套装4件套', probability:0.02, isSpecial:false, choices:null },
        { index:3, name:'三等奖', label:'三等奖', detail:'黛茂诗居享套装3件套', probability:0.035, isSpecial:false, choices:null },
        { index:4, name:'四等奖', label:'四等奖', detail:'黛茂诗柑橘香洗手液', probability:0.05, isSpecial:false, choices:null },
        { index:5, name:'普惠奖', label:'普惠奖', detail:'黛茂诗官方小程序商城明信单品满99-20优惠券', probability:0.881, isSpecial:false, choices:null }
    ];

    let currentRotation = 0, highlightIndex = -1, isSpinning = false, animationId = null;
    let lastPrizeResult = null, selectedChoice = null;
    let hasUsed = localStorage.getItem(STORAGE_USED) === '1';
    let addressSubmitted = localStorage.getItem(STORAGE_ADDRESS) === '1';
    let savedPrizeIndex = parseInt(localStorage.getItem(STORAGE_RESULT));

    if (hasUsed && !isNaN(savedPrizeIndex) && savedPrizeIndex >= 0 && savedPrizeIndex < prizes.length) {
        lastPrizeResult = prizes[savedPrizeIndex];
        highlightIndex = savedPrizeIndex;
        currentRotation = getRotationForIndex(savedPrizeIndex);
    }

    function getRotationForIndex(i) { const sector = i * (Math.PI/3); return ((2*Math.PI)-sector) % (2*Math.PI); }

    const COLOR_LIGHT_GREEN_1 = '#d9eddf', COLOR_LIGHT_GREEN_2 = '#cfe5d5';
    const COLOR_HIGHLIGHT = '#2e7d32', COLOR_SEPARATOR = 'rgba(255,255,255,0.7)';
    const COLOR_TEXT = '#3d5a3f', COLOR_TEXT_HIGHLIGHT = '#ffffff';

    function determinePrizeIndex() {
        const rand = Math.random()*100; let cum=0;
        for(let i=0;i<prizes.length;i++){ cum += prizes[i].probability*100; if(rand<cum) return i; }
        return prizes.length-1;
    }

    function getTargetRotation(targetIndex, startRotation) {
        const sectorCenterFromTop = targetIndex * (Math.PI/3);
        const base = ((2*Math.PI)-sectorCenterFromTop)%(2*Math.PI);
        let delta = ((base - (startRotation % (2*Math.PI))) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
        const extra = 5+Math.floor(Math.random()*4);
        return startRotation + delta + extra*2*Math.PI;
    }

    function easeOutQuart(t) { return 1-Math.pow(1-t,4); }

    function drawWheel(rotation, highlightIdx) {
        ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
        const num = prizes.length, sectorAngle = (2*Math.PI)/num;
        for(let i=0;i<num;i++) {
            const baseStart = -Math.PI/2 - sectorAngle/2 + i*sectorAngle;
            const start = baseStart+rotation, end = start+sectorAngle;
            const highlighted = (highlightIdx===i);
            let fill = highlighted ? COLOR_HIGHLIGHT : ((i%2===0)?COLOR_LIGHT_GREEN_1:COLOR_LIGHT_GREEN_2);
            ctx.beginPath();
            ctx.moveTo(cx+innerRadius*Math.cos(start), cy+innerRadius*Math.sin(start));
            ctx.arc(cx,cy,outerRadius,start,end);
            ctx.lineTo(cx+innerRadius*Math.cos(end), cy+innerRadius*Math.sin(end));
            ctx.arc(cx,cy,innerRadius,end,start,true);
            ctx.closePath();
            ctx.fillStyle=fill; ctx.fill();
            if(highlighted){
                const grad=ctx.createRadialGradient(cx,cy,innerRadius,cx,cy,outerRadius);
                grad.addColorStop(0,'rgba(255,255,255,0.15)'); grad.addColorStop(0.5,'rgba(255,255,255,0.05)'); grad.addColorStop(1,'rgba(0,0,0,0.08)');
                ctx.fillStyle=grad; ctx.fill();
            }
            ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=1.2; ctx.stroke();
        }
        for(let i=0;i<num;i++) {
            const baseAngle = -Math.PI/2 - sectorAngle/2 + i*sectorAngle;
            const lineAngle = baseAngle+rotation;
            ctx.beginPath(); ctx.moveTo(cx+innerRadius*Math.cos(lineAngle), cy+innerRadius*Math.sin(lineAngle));
            ctx.lineTo(cx+outerRadius*Math.cos(lineAngle), cy+outerRadius*Math.sin(lineAngle));
            ctx.strokeStyle=COLOR_SEPARATOR; ctx.lineWidth=1.8; ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(cx,cy,outerRadius,0,2*Math.PI); ctx.strokeStyle='rgba(180,200,182,0.6)'; ctx.lineWidth=2.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy,innerRadius,0,2*Math.PI); ctx.strokeStyle='rgba(180,200,182,0.5)'; ctx.lineWidth=2; ctx.stroke();

        for(let i=0;i<num;i++) {
            const baseCenter = -Math.PI/2 + i*sectorAngle;
            const textAngle = baseCenter+rotation;
            const textRadius = (innerRadius+outerRadius)/2;
            const hi = (highlightIdx===i);
            ctx.save(); ctx.translate(cx,cy); ctx.rotate(textAngle);
            const na = ((textAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
            const flip = (na > Math.PI/2 && na < 3*Math.PI/2);
            if(flip) ctx.rotate(Math.PI);
            ctx.fillStyle = hi ? COLOR_TEXT_HIGHLIGHT : COLOR_TEXT;
            ctx.font = `bold 17px ${fontFamily}`;
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(prizes[i].label, flip ? -textRadius : textRadius, 0);
            ctx.restore();
        }

        ctx.beginPath(); ctx.arc(cx+2,cy+3,centerDiscRadius,0,2*Math.PI); ctx.fillStyle='rgba(0,0,0,0.08)'; ctx.fill();
        const discGrad=ctx.createRadialGradient(cx-15,cy-20,centerDiscRadius*0.1,cx,cy,centerDiscRadius);
        discGrad.addColorStop(0,'#ffffff'); discGrad.addColorStop(0.85,'#f8faf8'); discGrad.addColorStop(1,'#eef5ef');
        ctx.beginPath(); ctx.arc(cx,cy,centerDiscRadius,0,2*Math.PI); ctx.fillStyle=discGrad; ctx.fill();
        ctx.strokeStyle='#c8e0ca'; ctx.lineWidth=2.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy,centerDiscRadius-9,0,2*Math.PI); ctx.strokeStyle='rgba(180,200,182,0.45)'; ctx.lineWidth=1.5; ctx.setLineDash([8,12]); ctx.stroke(); ctx.setLineDash([]);

        // 中间圆盘文字区域 —— 已修复字体设置
        let discText='点击抽奖', discSub='', discColor='#5a7d5c', fontSize=19, fontWeight='600';
        if(isSpinning){ discText='抽奖中'; discSub='...'; discColor='#8aa98d'; fontSize=18; }
        else if(highlightIdx>=0 && lastPrizeResult){
            discText=lastPrizeResult.label; discColor=lastPrizeResult.isSpecial?'#b8860b':'#2e7d32'; fontSize=21; fontWeight='700';
            if(lastPrizeResult.isSpecial) discSub='🎉 恭喜 🎉';
        }
        if(discSub){
            ctx.fillStyle = discColor;
            ctx.font = `500 12px ${fontFamily}`;  // 修复：完整字体字符串
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(discSub, cx, cy-16);
        }
        ctx.fillStyle = discColor;
        ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;  // 修复：完整字体字符串
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(discText, cx, cy + (discSub?6:0));

        // 指针
        const pTipY=cy-outerRadius+2, pHeight=38, pHalf=18, pBaseY=pTipY-pHeight;
        ctx.beginPath(); ctx.moveTo(cx,pTipY+2); ctx.lineTo(cx-pHalf,pBaseY+2); ctx.lineTo(cx+pHalf,pBaseY+2); ctx.closePath(); ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx,pTipY); ctx.lineTo(cx-pHalf,pBaseY); ctx.quadraticCurveTo(cx,pBaseY-6,cx+pHalf,pBaseY); ctx.closePath();
        const pGrad=ctx.createLinearGradient(cx,pBaseY,cx,pTipY); pGrad.addColorStop(0,'#1b5e20'); pGrad.addColorStop(1,'#43a047'); ctx.fillStyle=pGrad; ctx.fill();
        ctx.strokeStyle='#1b5e20'; ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,pBaseY+8,4,0,2*Math.PI); ctx.fillStyle='#fdfdfd'; ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1; ctx.stroke();
    }

    function spinWheel(targetIndex) {
        if(isSpinning || hasUsed) return;
        isSpinning=true; highlightIndex=-1; lastPrizeResult=null; selectedChoice=null;
        updateResultArea(null); wheelCard.classList.remove('has-result');
        canvasWrap.classList.add('disabled'); btnDraw.disabled=true; btnDraw.innerHTML='⏳ 抽奖中...';
        const startRotation=currentRotation; const targetRotation=getTargetRotation(targetIndex,startRotation);
        const total=targetRotation-startRotation; const duration=4200+Math.random()*800; const startTime=performance.now();
        function animate(now){
            const elapsed=now-startTime; const progress=Math.min(elapsed/duration,1);
            currentRotation=startRotation+total*easeOutQuart(progress); drawWheel(currentRotation,-1);
            if(progress<1){ animationId=requestAnimationFrame(animate); }
            else{
                currentRotation=targetRotation; highlightIndex=targetIndex; lastPrizeResult=prizes[targetIndex];
                drawWheel(currentRotation,highlightIndex); updateResultArea(lastPrizeResult);
                wheelCard.classList.add('has-result');
                localStorage.setItem(STORAGE_USED,'1');
                localStorage.setItem(STORAGE_RESULT,targetIndex);
                hasUsed = true;
                usedMessage.classList.add('show');
                btnDraw.disabled=true; btnDraw.innerHTML='已参与抽奖';
                canvasWrap.classList.add('disabled');
                isSpinning=false;
                if(lastPrizeResult.isSpecial) triggerCelebration();
                showPrizeModal(lastPrizeResult);
            }
        }
        animationId=requestAnimationFrame(animate);
    }

    function updateResultArea(prize) {
        if(!prize){ resultArea.innerHTML='<span style="color:#b0bdb1;font-size:0.85rem;">点击转盘或下方按钮开始抽奖</span>'; return; }
        const cls=prize.isSpecial?' special':'';
        const wrapper=document.createElement('div'); wrapper.className='result-content';
        wrapper.innerHTML=`<span class="result-label">恭喜获得</span><span class="result-prize-name${cls}">${prize.label}</span><span class="result-detail">${prize.detail}</span>`;
        const btn=document.createElement('button'); btn.className='btn-open-modal'; btn.textContent='查看领奖详情';
        btn.onclick=(e)=>{e.stopPropagation(); if(lastPrizeResult) showPrizeModal(lastPrizeResult);};
        wrapper.appendChild(btn); resultArea.innerHTML=''; resultArea.appendChild(wrapper);
    }

    function showPrizeModal(prize) {
        modalPrizeTitle.textContent=prize.label;
        modalPrizeTitle.className='modal-prize-title'+(prize.isSpecial?' special':'');
        modalPrizeDetail.textContent=prize.detail;
        selectedChoice=null; choiceSection.style.display='none'; choiceButtons.innerHTML='';
        if(prize.choices && prize.choices.length){
            choiceSection.style.display='block';
            prize.choices.forEach(c=>{
                const btn=document.createElement('button'); btn.className='choice-btn'; btn.textContent=c;
                btn.onclick=()=>{ document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); selectedChoice=c; };
                choiceButtons.appendChild(btn);
            });
        }
        receiverName.value=''; receiverPhone.value=''; receiverAddress.value='';
        if(prize.index===5){
            addressSection.style.display='none';
            miniappSection.style.display='block';
        } else {
            addressSection.style.display='block';
            miniappSection.style.display='none';
            if(addressSubmitted){
                btnSubmitAddress.disabled=true;
                btnSubmitAddress.textContent='已提交';
                submitSuccess.style.display='block';
            } else {
                btnSubmitAddress.disabled=false;
                btnSubmitAddress.textContent='提交地址';
                submitSuccess.style.display='none';
            }
        }
        prizeModal.classList.add('active');
    }

    function hidePrizeModal() { prizeModal.classList.remove('active'); }
    modalClose.onclick=hidePrizeModal;
    prizeModal.onclick=(e)=>{ if(e.target===prizeModal) hidePrizeModal(); };

    if(btnOpenMiniappQr) btnOpenMiniappQr.onclick = () => { miniappQrModal.classList.add('active'); };
    if(miniappQrClose) miniappQrClose.onclick = () => miniappQrModal.classList.remove('active');
    if(miniappQrModal) miniappQrModal.onclick = (e) => { if(e.target===miniappQrModal) miniappQrModal.classList.remove('active'); };

    btnSubmitAddress.onclick = () => {
        if(addressSubmitted) return;
        const name = receiverName.value.trim(), phone = receiverPhone.value.trim(), addr = receiverAddress.value.trim();
        if(!name||!phone||!addr){ alert('请完整填写'); return; }
        if(!/^1[3-9]\d{9}$/.test(phone)){ alert('手机号格式错误'); return; }
        if(lastPrizeResult && lastPrizeResult.choices && !selectedChoice){ alert('请先选择奖品'); return; }
        btnSubmitAddress.disabled=true; btnSubmitAddress.textContent='提交中...';
        const prizeName = lastPrizeResult?.label || '未知';
        const choiceText = selectedChoice ? `\n选择：${selectedChoice}` : '';
        const msg = `🎉 新中奖地址\n奖品：${prizeName}${choiceText}\n姓名：${name}\n手机：${phone}\n地址：${addr}\n时间：${new Date().toLocaleString()}`;
        fetch(FEISHU_WEBHOOK,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg_type:'text',content:{text:msg}}) })
        .then(r=>r.json()).then(data=>{
            if(data.code===0||data.StatusCode===0){
                addressSubmitted = true;
                localStorage.setItem(STORAGE_ADDRESS,'1');
                btnSubmitAddress.textContent='已提交';
                submitSuccess.style.display='block';
            } else {
                alert('提交失败，请重试');
                btnSubmitAddress.disabled=false;
                btnSubmitAddress.textContent='提交地址';
            }
        }).catch(()=>{ alert('网络错误'); btnSubmitAddress.disabled=false; btnSubmitAddress.textContent='提交地址'; });
    };

    function triggerCelebration() {
        const rect=wheelCard.getBoundingClientRect(); const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
        for(let i=0;i<30;i++){
            const p=document.createElement('span'); const a=Math.random()*2*Math.PI, d=80+Math.random()*160, s=6+Math.random()*14;
            p.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${s}px;height:${s}px;background:#f9d423;border-radius:50%;pointer-events:none;z-index:9999;opacity:1;transition:all 1.2s cubic-bezier(.25,.46,.45,.94);`;
            document.body.appendChild(p);
            requestAnimationFrame(()=>{ p.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`; p.style.opacity='0'; });
            setTimeout(()=>p.remove(),1300);
        }
    }

    function handleDraw(){
        if(isSpinning || hasUsed){ if(hasUsed) alert('每位用户仅限抽奖一次，感谢参与。'); return; }
        const targetIndex=determinePrizeIndex(); spinWheel(targetIndex);
    }
    canvasWrap.onclick=()=>{ if(!isSpinning && !hasUsed) handleDraw(); };
    btnDraw.onclick=()=>handleDraw();

    const rulesText = `
        <h3>一、活动时间</h3><p>2026年5月20日 00:00 - 2026年8月20日 23:59</p>
        <h3>二、活动形式</h3><p>活动期间，用户扫码添加【DEMORES 黛茂诗】官方企业微信，即可获得1次抽奖转盘参与机会。每位用户仅限参与1次抽奖，中奖结果以系统实时显示为准。</p>
        <h3>三、奖品设置</h3><p>本次活动共设置6个奖项，奖品数量有限，抽完即止：</p>
        <ul><li><strong>特等奖</strong> 共4名（二选一）…</li><li><strong>一等奖</strong> 共10名（二选一）…</li><li><strong>二等奖</strong> 20名：黛茂诗居享套装4件套</li><li><strong>三等奖</strong> 35名：黛茂诗居享套装3件套</li><li><strong>四等奖</strong> 50名：黛茂诗柑橘香洗手液</li><li><strong>普惠奖</strong> 不限量：黛茂诗官方小程序商城明信单品满99-20优惠券</li></ul>
        <h3>四、奖品兑换及使用说明</h3><p>中奖用户需在7天内联系企业微信客服完成兑奖登记，详情请添加客服咨询。</p>
        <h3>五、其他</h3><p>最终解释权归DEMORES黛茂诗品牌所有。</p>
    `;
    document.getElementById('rulesContent').innerHTML = rulesText;
    document.getElementById('rulesBtn').onclick = () => rulesModal.classList.add('active');
    rulesClose.onclick = () => rulesModal.classList.remove('active');
    rulesModal.onclick = (e) => { if(e.target===rulesModal) rulesModal.classList.remove('active'); };

    if(hasUsed && lastPrizeResult) {
        usedMessage.classList.add('show');
        btnDraw.disabled = true;
        btnDraw.innerHTML = '已参与抽奖';
        canvasWrap.classList.add('disabled');
        drawWheel(currentRotation, highlightIndex);
        updateResultArea(lastPrizeResult);
    } else {
        drawWheel(currentRotation, -1);
        btnDraw.disabled = false;
        btnDraw.innerHTML = '🎯 开始抽奖';
    }

    window.addEventListener('resize', () => { drawWheel(currentRotation, highlightIndex); });
})();
</script>
</body>
